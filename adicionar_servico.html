<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Serviço - BarberOn</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="painel">

<img src="logo.png" class="logo">

<h1>Novo Serviço ✂️</h1>

<p>Cadastre um serviço da sua barbearia.</p>


<div class="login-box">

<input id="nome" type="text" placeholder="Nome do serviço">

<input id="valor" type="text" placeholder="Valor (ex: R$ 30)">

<input id="tempo" type="text" placeholder="Duração (ex: 30 minutos)">


<button class="btn" id="salvar">
Salvar Serviço
</button>


</div>

</div>


<script>

document.getElementById("salvar").onclick = function(){

let nome = document.getElementById("nome").value;
let valor = document.getElementById("valor").value;
let tempo = document.getElementById("tempo").value;


if(nome == "" || valor == "" || tempo == ""){
alert("Preencha todos os campos");
return;
}


let servicos = JSON.parse(localStorage.getItem("servicos")) || [];


servicos.push({
nome: nome,
valor: valor,
tempo: tempo
});


localStorage.setItem("servicos", JSON.stringify(servicos));


alert("Serviço salvo!");


window.location.href = "servicos.html";

};

</script>


</body>

</html>
