<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serviços - BarberOn</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="painel">

<img src="logo.png" class="logo">

<h1>Serviços ✂️</h1>

<p>Organize os serviços da sua barbearia.</p>


<a href="adicionar_servico.html" class="btn">
+ Adicionar Serviço
</a>


<h2 style="margin-top:30px;">
Lista de Serviços
</h2>


<div id="listaServicos" class="lista-servicos">

</div>


</div>



<script>

let lista = document.getElementById("listaServicos");

let servicos = JSON.parse(localStorage.getItem("servicos")) || [];


if(servicos.length === 0){

lista.innerHTML = `
<div class="servico-box">
<h2>Nenhum serviço cadastrado</h2>
<p>Adicione seu primeiro serviço.</p>
</div>
`;

}


servicos.forEach(function(servico){

lista.innerHTML += `

<div class="servico-box">

<h2>${servico.nome}</h2>

<div class="informacao">
Valor: ${servico.valor}
</div>

<div class="informacao">
Duração: ${servico.duracao}
</div>


<button class="btn">
Editar
</button>

<button class="btn">
Excluir
</button>


</div>

`;

});


</script>


</body>

</html>
