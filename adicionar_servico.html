<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Serviço - BarberOn</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="painel">

<img src="logo.png" class="logo">

<h1>Novo Serviço ✂️</h1>

<p>Cadastre um serviço da sua barbearia.</p>


<div class="login-box">

<input id="nomeServico" type="text" placeholder="Nome do serviço">

<input id="valorServico" type="text" placeholder="Valor do serviço (ex: R$ 30)">

<input id="duracaoServico" type="text" placeholder="Duração (ex: 30 minutos ou 1 hora)">


<button class="btn" onclick="salvarServico()">
Salvar Serviço
</button>


</div>

</div>


<script>

function salvarServico(){

let nome = document.getElementById("nomeServico").value;
let valor = document.getElementById("valorServico").value;
let duracao = document.getElementById("duracaoServico").value;


if(nome === "" || valor === "" || duracao === ""){

alert("Preencha todos os campos");

return;

}


let servicos = JSON.parse(localStorage.getItem("servicos")) || [];


servicos.push({

nome: nome,
valor: valor,
duracao: duracao

});


localStorage.setItem("servicos", JSON.stringify(servicos));


alert("Serviço salvo com sucesso!");


window.location.assign("servicos.html");


}

</script>


</body>

</html>
