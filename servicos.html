<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serviços - BarberOn</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="pagina">

<img src="logo.png" class="logo">

<h1>Serviços ✂️</h1>

<p>Gerencie os serviços da sua barbearia.</p>


<a href="adicionar_servico.html" class="btn">
+ Adicionar Serviço
</a>


<h2 class="titulo-lista">Lista de Serviços</h2>


<div id="listaServicos">


<div class="servico-box">

<h2>Corte Masculino</h2>

<p>Valor: R$ 30</p>

<p>Duração: 40 minutos</p>

</div>


<div class="servico-box">

<h2>Barba</h2>

<p>Valor: R$ 20</p>

<p>Duração: 30 minutos</p>

</div>


</div>


</div>


<script>

let lista = JSON.parse(localStorage.getItem("servicos")) || [];

let area = document.getElementById("listaServicos");


lista.forEach(function(servico){

area.innerHTML += `

<div class="servico-box">

<h2>${servico.nome}</h2>

<p>Valor: ${servico.valor}</p>

<p>Duração: ${servico.duracao}</p>

</div>

`;

});

</script>


</body>

</html>
