<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cliente - BarberOn</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="login-page">

<div class="login-box">

<img src="logo.png" class="logo" alt="BarberOn">

<h1>Área do Cliente</h1>

<p>Entre ou crie sua conta para agendar seu corte.</p>

<input type="text" placeholder="Nome">

<input type="tel" placeholder="Telefone">

<input type="password" placeholder="Senha">

<button class="btn">
Entrar
</button>

<p>
Ainda não tem conta?
<br>
<button class="btn">
Criar Conta
</button>
</p>

</div>

</header>

</body>
</html>
